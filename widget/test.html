<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitAI Widget Test Page</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .product-image { width: 400px; border-radius: 8px; }
    h1 { margin-bottom: 8px; }
    .price { font-size: 24px; color: #c4653a; margin-bottom: 16px; }
    .button-area { margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Demo Product Page</h1>
  <p class="price">₹3,490</p>
  
  <img class="product-image" 
       src="https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=600" 
       alt="Product">
  
  <div class="button-area" id="tryon-buttons">
    <!-- Widget button will be injected here -->
  </div>

  <!-- FitAI Widget Embed -->
  <script 
    src="./dist/widget.js" 
    data-brand-id="YOUR_BRAND_API_KEY_HERE"
    data-garment-selector=".product-image"
    data-target="#tryon-buttons"
    async>
  </script>
</body>
</html>
